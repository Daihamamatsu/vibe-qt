version: '3.8'

services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: nouchka/sqlite3
    volumes:
      - db_data:/data/db
    command: sqlite3 /data/db/stock.db

volumes:
  db_data: